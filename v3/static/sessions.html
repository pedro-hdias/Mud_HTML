<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Active Sessions - Debug</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }

        h1 {
            color: #4CAF50;
        }

        .summary {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            border: 2px solid #4CAF50;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #4CAF50;
        }

        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #3a3a3a;
        }

        tr:hover {
            background: #3a3a3a;
        }

        .state {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .state.CONNECTED {
            background: #4CAF50;
            color: white;
        }

        .state.DISCONNECTED {
            background: #f44336;
            color: white;
        }

        .state.CONNECTING {
            background: #ff9800;
            color: white;
        }

        .session-id {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #888;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px 0;
        }

        button:hover {
            background: #45a049;
        }

        .last-update {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin: 10px 0;
        }

        /* Accessibility */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #4CAF50;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 0 0 4px 0;
            z-index: 10000;
            transition: top 0.3s;
        }

        .skip-link:focus {
            top: 0;
            outline: 3px solid #ffc107;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <a href="#sessionsTable" class="skip-link">Skip to sessions table</a>
    <a href="#controls" class="skip-link">Skip to controls</a>

    <header role="banner">
        <h1>🎮 Active MUD Sessions</h1>
    </header>

    <main role="main">
        <section aria-labelledby="summaryHeading">
            <h2 id="summaryHeading" class="visually-hidden">Sessions Summary</h2>
            <div class="summary">
                <div class="stat-card">
                    <h3>Total Sessions</h3>
                    <div class="number" id="totalSessions" aria-live="polite">-</div>
                </div>
                <div class="stat-card">
                    <h3>Connected Clients</h3>
                    <div class="number" id="totalClients" aria-live="polite">-</div>
                </div>
            </div>
        </section>

        <nav id="controls" aria-label="Session controls">
            <button onclick="refreshData()" aria-label="Refresh session data">🔄 Refresh</button>
            <button onclick="toggleAutoRefresh()" aria-label="Toggle auto-refresh">⏱️ Auto-refresh (<span
                    id="autoRefreshState">OFF</span>)</button>
        </nav>

        <div class="last-update" id="lastUpdate" role="status" aria-live="polite">-</div>

        <section aria-labelledby="sessionsTableHeading">
            <h2 id="sessionsTableHeading" class="visually-hidden">Sessions Details</h2>
            <table role="table" aria-label="Active sessions information">
                <thead>
                    <tr>
                        <th scope="col">Session ID</th>
                        <th scope="col">State</th>
                        <th scope="col">Clients</th>
                        <th scope="col">Last Activity</th>
                        <th scope="col">History (bytes)</th>
                    </tr>
                </thead>
                <tbody id="sessionsTable" role="rowgroup">
                    <tr>
                        <td colspan="5" style="text-align: center;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        let autoRefreshInterval = null;

        async function refreshData() {
            try {
                const response = await fetch('/api/sessions/status');
                const data = await response.json();

                // Updates summary
                document.getElementById('totalSessions').textContent = data.total_sessions;
                document.getElementById('totalClients').textContent = data.total_clients;

                // Updates table
                const tbody = document.getElementById('sessionsTable');
                if (data.sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No active sessions</td></tr>';
                } else {
                    tbody.innerHTML = data.sessions.map(session => {
                        const lastActivity = new Date(session.last_activity);
                        const timeAgo = getTimeAgo(lastActivity);

                        return `
                            <tr>
                                <td class="session-id">${session.session_id.substring(0, 8)}...</td>
                                <td><span class="state ${session.state}">${session.state}</span></td>
                                <td>${session.clients_count}</td>
                                <td>${timeAgo}</td>
                                <td>${session.history_size.toLocaleString()}</td>
                            </tr>
                        `;
                    }).join('');
                }

                // Updates timestamp
                document.getElementById('lastUpdate').textContent =
                    `Last update: ${new Date().toLocaleTimeString()}`;

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('sessionsTable').innerHTML =
                    '<tr><td colspan="5" style="text-align: center; color: red;">Error loading data</td></tr>';
            }
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);

            if (seconds < 60) return `${seconds}s ago`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
            return `${Math.floor(seconds / 86400)}d ago`;
        }

        function toggleAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                document.getElementById('autoRefreshState').textContent = 'OFF';
            } else {
                autoRefreshInterval = setInterval(refreshData, 5000);
                document.getElementById('autoRefreshState').textContent = 'ON (5s)';
                refreshData();
            }
        }

        // Load data on open
        refreshData();
    </script>
</body>

</html>
