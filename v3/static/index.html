<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web MUD Client</title>
    <!-- Configurações externalizáveis via meta tags (override padrões de config.js) -->
    <!-- <meta name="mud-ws-url" content="ws://localhost:80/ws"> -->
    <!-- <meta name="mud-log-level" content="warn"> -->
    <link rel="icon" id="favicon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23666'/></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <!-- Top Controls -->
    <div id="controls">
        <button id="btnLogin" aria-label="Connect to server">Login</button>
        <button id="btnDisconnect" aria-label="Disconnect from server" disabled>Disconnect</button>
        <button id="btnClear" aria-label="Clear screen" title="Clear all output history">Clear Screen</button>
        <button id="btnSoundToggle" aria-label="Toggle automatic audio"
            title="Enable/disable automatic sound playback">🔊 Audio: OFF</button>

        <div id="statusIndicator">
            <div id="statusDot"></div>
            <span id="statusText">Disconnected</span>
        </div>

        <div id="reconnectStatus" aria-live="polite" hidden>
            <span>Reconnecting...</span>
            <button id="btnCancelReconnect" type="button">Cancel attempt</button>
        </div>
    </div>

    <!-- Output Area -->
    <div id="output" role="log" aria-live="polite" aria-atomic="false">
    </div>

    <!-- Input Area -->
    <div id="inputArea">
        <input id="input" type="text" placeholder="Enter a command (multiple: use ;)" aria-label="Enter a command"
            disabled />
        <button id="btnSend" aria-label="Send command" title="Send command" disabled>Send</button>
    </div>

    <div id="inputHints">Enter to send, ; for multiple commands</div>

    <!-- Login Modal -->
    <div id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <form id="loginForm">
            <h2 id="loginTitle">Login to Game</h2>
            <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">The server is waiting for your credentials.
                Fill in below or click "Type Manually" to login directly in the terminal.</p>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required autocomplete="username" />

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />

            <div class="form-check">
                <input type="checkbox" id="saveSession" name="saveSession" />
                <label for="saveSession">Save credentials for 30 days</label>
            </div>

            <button type="submit">Login</button>
            <button type="button" id="btnCancelLogin" style="margin-top: 10px;"
                title="Close popup and type login manually in terminal">Type Manually</button>
        </form>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div id="confirmBox">
            <h2 id="confirmTitle">Confirmation</h2>
            <pre id="confirmText"></pre>
            <div class="confirm-actions">
                <button type="button" id="btnConfirmYes">Yes</button>
                <button type="button" id="btnConfirmNo" class="secondary">No</button>
            </div>
        </div>
    </div>

    <!-- Important loading order: dependencies first -->
    <script src="/static/js/logger.js"></script>
    <script src="/static/js/config.js"></script>
    <script src="/static/js/storage.js"></script>
    <script src="/static/js/prompts.js"></script>
    <script src="/static/js/modals.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/menu.js"></script>
    <script src="/static/js/events.js"></script>
    <script src="/static/js/ui.js"></script>
    <!-- Modularized audio package (audio/) -->
    <script src="/static/js/audio/context.js"></script>
    <script src="/static/js/audio/buffer.js"></script>
    <script src="/static/js/audio/registry.js"></script>
    <script src="/static/js/audio/playback.js"></script>
    <script src="/static/js/audio/controls.js"></script>
    <script src="/static/js/audio/state.js"></script>
    <script src="/static/js/audio/index.js"></script>
    <script src="/static/js/sound-handler.js"></script>
    <script src="/static/js/ws.js"></script>

</body>

</html>
