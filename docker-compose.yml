services:
  mud-html:
    build:
      context: ./v4
      dockerfile: Dockerfile
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--reload", "--reload-dir", "/app/app" ]
    ports:
      - "127.0.0.1:18080:80"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./v4:/app
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./v4/requirements.txt
        - action: rebuild
          path: ./v4/Dockerfile
    restart: unless-stopped
