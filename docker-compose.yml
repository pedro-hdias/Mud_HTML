services:
  mud-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--reload", "--reload-dir", "/app/app" ]
    environment:
      - PYTHONUNBUFFERED=1
      - SOUND_REGISTRY_DIR=/app/sounds
    volumes:
      - ./backend:/app
      - ./frontend/static/sounds:/app/sounds:ro
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt
        - action: rebuild
          path: ./backend/Dockerfile
    restart: unless-stopped

  mud-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      mud-backend:
        condition: service_healthy
    volumes:
      - ./frontend/static:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    develop:
      watch:
        - action: rebuild
          path: ./frontend/Dockerfile
        - action: rebuild
          path: ./frontend/nginx.conf
    restart: unless-stopped
