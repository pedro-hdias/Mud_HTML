services:
  mud-html:
    build: ./v4
    container_name: mud-html
    ports:
      - "80:80"
    environment:
      - PYTHONUNBUFFERED=1
      # Defina WEB_AUTH_PASSWORD para exigir senha apenas no /shamy.
      - WEB_AUTH_USERNAME=shamy2026
      - WEB_AUTH_PASSWORD=ShAmy<3
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  diario:
    build:
      context: ./v4/static/shamy
    container_name: diario-web
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    build:
      context: ./v4/static/shamy/backend
    container_name: diario-backend
    volumes:
      - diario-data:/data
    restart: unless-stopped

volumes:
  diario-data:
