name: Deploy VPS on Release Published

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            release_tag:
                description: Tag da release para deploy manual (opcional)
                required: false
                type: string

jobs:
    deploy-vps:
        name: Publicar release na VPS
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Validar configuração obrigatória
              run: |
                  if [ -z "${{ vars.DEPLOY_PATH }}" ]; then
                    echo "❌ A variável DEPLOY_PATH não foi configurada."
                    exit 1
                  fi

                  if [ -z "${{ vars.VPS_HOST }}" ]; then
                    echo "❌ A variável VPS_HOST não foi configurada."
                    exit 1
                  fi

                  if [ -z "${{ secrets.VPS_USER }}" ]; then
                    echo "❌ O secret VPS_USER não foi configurado."
                    exit 1
                  fi

                  if [ -z "${{ secrets.VPS_PORT }}" ]; then
                    echo "❌ O secret VPS_PORT não foi configurado."
                    exit 1
                  fi

                  if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
                    echo "❌ O secret VPS_SSH_KEY não foi configurado."
                    exit 1
                  fi

            - name: Conectar via SSH e executar deploy
              id: deploy_attempt_1
              uses: appleboy/ssh-action@v1.0.3
              continue-on-error: true
              with:
                  host: ${{ vars.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT }}
                  timeout: 2m
                  command_timeout: 20m
                  script: |
                      set -e

                      DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
                      RELEASE_TAG="${{ github.event.release.tag_name || inputs.release_tag }}"

                      echo "==== DEPLOY START $(date) ===="
                      echo "Diretório: ${DEPLOY_PATH}"
                      echo "Tag solicitada: ${RELEASE_TAG:-main}"

                      cd "$DEPLOY_PATH"
                      git fetch --all --tags --prune
                      git checkout main
                      git pull --ff-only origin main

                      if [ -n "$RELEASE_TAG" ]; then
                        git checkout "$RELEASE_TAG"
                      fi

                      docker compose up -d --build
                      docker compose ps

                      echo "==== DEPLOY END $(date) ===="

            - name: Segunda tentativa de deploy
              id: deploy_attempt_2
              if: steps.deploy_attempt_1.outcome == 'failure'
              uses: appleboy/ssh-action@v1.0.3
              continue-on-error: true
              with:
                  host: ${{ vars.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: ${{ secrets.VPS_PORT }}
                  timeout: 2m
                  command_timeout: 20m
                  script: |
                      set -e

                      DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
                      RELEASE_TAG="${{ github.event.release.tag_name || inputs.release_tag }}"

                      echo "==== RETRY DEPLOY START $(date) ===="

                      cd "$DEPLOY_PATH"
                      git fetch --all --tags --prune
                      git checkout main
                      git pull --ff-only origin main

                      if [ -n "$RELEASE_TAG" ]; then
                        git checkout "$RELEASE_TAG"
                      fi

                      docker compose up -d --build
                      docker compose ps

                      echo "==== RETRY DEPLOY END $(date) ===="

            - name: Validar resultado do deploy
              if: always()
              run: |
                  if [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ] || [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
                    echo "✅ Deploy concluído com sucesso." >> $GITHUB_STEP_SUMMARY
                    echo "- Host: ${{ vars.VPS_HOST }}" >> $GITHUB_STEP_SUMMARY
                    echo "- Diretório: ${{ vars.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
                    echo "- Tag: ${{ github.event.release.tag_name || inputs.release_tag || 'main' }}" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "❌ Falha nas duas tentativas de deploy via SSH." >> $GITHUB_STEP_SUMMARY
                    exit 1
                  fi
