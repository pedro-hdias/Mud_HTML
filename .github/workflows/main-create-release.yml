name: Create GitHub Release on Main Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  deploy-vps:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Conectar via SSH e executar deploy (tentativa 1)
        id: deploy_attempt_1
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 20m
          script: |
            cd ${{ vars.DEPLOY_PATH }}

            echo "==== DEPLOY START $(date) ===="

            git pull origin main

            docker compose down
            docker compose build --no-cache
            docker compose up -d

            docker image prune -af
            docker builder prune -af

            echo "==== DEPLOY END $(date) ===="

      - name: Conectar via SSH e executar deploy (tentativa 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 2m
          command_timeout: 20m
          script: |
            cd ${{ vars.DEPLOY_PATH }}

            echo "==== DEPLOY START $(date) ===="

            git pull origin main

            docker compose down
            docker compose build --no-cache
            docker compose up -d

            docker image prune -af
            docker builder prune -af

            echo "==== DEPLOY END $(date) ===="

      - name: Validar resultado do deploy
        if: always()
        run: |
          if [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ] || [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
            echo "✅ Deploy concluído com sucesso."
          else
            echo "❌ Falha nas duas tentativas de deploy via SSH."
            exit 1
          fi

  create-github-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'
    needs: deploy-vps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Fazer checkout da main
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. Obter data/hora da release
      - name: Get current datetime
        id: date
        run: |
          DATE_FORMATTED=$(date -u +'%y.%m.%d.%H%M')
          echo "date=$DATE_FORMATTED" >> $GITHUB_OUTPUT
          echo "Current datetime: $DATE_FORMATTED"

      # 3. Identificar a pasta v* mais recente
      - name: Identify latest version
        id: version
        run: |
          LATEST_VERSION=$(ls -d v*/ 2>/dev/null | sed 's#/##' | sort -V | tail -n1 || echo "v1")
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest version found: $LATEST_VERSION"

      # 4. Montar tag da release
      - name: Build release tag
        id: version_info
        run: |
          VERSION_TAG="${{ steps.version.outputs.latest_version }}.${{ steps.date.outputs.date }}"
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "Version tag: $VERSION_TAG"

      # 5. Verificar se a release já existe
      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_EXISTS=$(gh release view "${{ steps.version_info.outputs.version_tag }}" 2>/dev/null && echo "true" || echo "false")
          echo "exists=$RELEASE_EXISTS" >> $GITHUB_OUTPUT
          echo "Release exists: $RELEASE_EXISTS"

      # 6. Criar a release do GitHub
      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version_info.outputs.version_tag }}" \
            --target main \
            --title "Release ${{ steps.version_info.outputs.version_tag }}" \
            --notes "## 🚀 Release ${{ steps.version_info.outputs.version_tag }}
            
            Esta release foi criada automaticamente após o merge do PR #${{ github.event.pull_request.number }}.
            
            ### 📅 Tag
            \`${{ steps.version_info.outputs.version_tag }}\`
            
            ### 🔗 Links
            - [Pull Request #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})
            - [Branch de Origem](${{ github.event.pull_request.head.ref }})
            
            ---
            *Esta release foi criada automaticamente pelo GitHub Actions*"

          echo "✅ Release criada com sucesso!"

      # 7. Atualizar release existente
      - name: Update existing release
        if: steps.check_release.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "ℹ️ Release ${{ steps.version_info.outputs.version_tag }} já existe"

      # 8. Resumo
      - name: Summary
        run: |
          echo "## ✅ Release Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy VPS**: concluído antes da release" >> $GITHUB_STEP_SUMMARY
          echo "- **PR Mergeado**: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.event.pull_request.head.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.version_info.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.check_release.outputs.exists == 'true' && 'Release atualizada' || 'Release criada' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Ver Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version_info.outputs.version_tag }})" >> $GITHUB_STEP_SUMMARY
