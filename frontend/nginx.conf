server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /mud {
        return 301 /mud/;
    }

    location = /mud/ {
        try_files /index.html =404;
    }

    location = /logs {
        try_files /logs.html =404;
    }

    location = /sessions {
        try_files /sessions.html =404;
    }

    location = /mud/logs {
        try_files /logs.html =404;
    }

    location = /mud/sessions {
        try_files /sessions.html =404;
    }

    location /css/ {
        try_files $uri =404;
    }

    location /js/ {
        try_files $uri =404;
    }

    location /sounds/ {
        try_files $uri =404;
    }

    # Compatibilidade com URLs legadas que ainda usam /static/
    location /static/ {
        rewrite ^/static/(.*)$ /$1 break;
        try_files $uri =404;
    }

    location /mud/css/ {
        rewrite ^/mud/css/(.*)$ /css/$1 break;
        try_files $uri =404;
    }

    location /mud/js/ {
        rewrite ^/mud/js/(.*)$ /js/$1 break;
        try_files $uri =404;
    }

    location /mud/sounds/ {
        rewrite ^/mud/sounds/(.*)$ /sounds/$1 break;
        try_files $uri =404;
    }

    location /mud/static/ {
        rewrite ^/mud/static/(.*)$ /$1 break;
        try_files $uri =404;
    }

    location /ws {
        proxy_pass http://mud-backend:80/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mud/ws {
        proxy_pass http://mud-backend:80/mud/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://mud-backend:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mud/api/ {
        proxy_pass http://mud-backend:80/mud/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://mud-backend:80/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mud/health {
        proxy_pass http://mud-backend:80/mud/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
